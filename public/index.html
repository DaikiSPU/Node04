<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Cars App</h1>

  <h2>Add a Car</h2>

  <form id="carForm" method="POST" action="/api/cars">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="make" placeholder="Make" required>
    <input type="number" id="year" placeholder="Year" required>
    <input type="text" id="color" placeholder="Color" required>
    <button type="submit">Add Car</button>
  </form>

  <h2>Cars</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Brand</th>
        <th>Make</th>
        <th>Year</th>
        <th>Color</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="carsTableBody"></tbody>
  </table>

  <script>
    const form = document.getElementById("carForm");
    const tableBody = document.getElementById("carsTableBody");

    async function loadCars() {
      const response = await fetch("/api/cars");
      const cars = await response.json();

      tableBody.innerHTML = "";

      cars.forEach(car => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${car.id}</td>
          <td>${car.brand}</td>
          <td>${car.make}</td>
          <td>${car.year}</td>
          <td>${car.color}</td>
          <td class="actionTd">
          </td>
        `;
        
        const actionTd = row.querySelector(".actionTd");

        // DELETE ACTION
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "delete";
        deleteBtn.addEventListener("click", async () => {
          await fetch(`/api/cars/${car.id}`, {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json"
            }
          });

          loadCars();
        });

        // UPDATE ACTION
        const updateBtn = document.createElement("button");
        updateBtn.textContent = "update";
        updateBtn.addEventListener("click", () => {
          row.children[1].innerHTML = `<input type="text" value="${car.brand}">`;
          row.children[2].innerHTML = `<input type="text" value="${car.make}">`;
          row.children[3].innerHTML = `<input type="number" value="${car.year}">`;
          row.children[4].innerHTML = `<input type="text" value="${car.color}">`;

          deleteBtn.hidden = true;
          updateBtn.hidden = true;
          
          // SAVE ACTION
          const saveBtn = document.createElement("button");
          saveBtn.textContent = "save";
          saveBtn.addEventListener("click", async () => {
            const updatedCar = {
              brand: row.children[1].querySelector("input").value,
              make: row.children[2].querySelector("input").value,
              year: row.children[3].querySelector("input").value,
              color: row.children[4].querySelector("input").value
            };

            await fetch(`/api/cars/${car.id}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify(updatedCar)
            });

            loadCars();
          });
          actionTd.appendChild(saveBtn);
        });
        

        actionTd.appendChild(deleteBtn);
        actionTd.appendChild(updateBtn);
        tableBody.appendChild(row);
      });
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const newCar = {
        brand: document.getElementById("brand").value,
        make: document.getElementById("make").value,
        year: document.getElementById("year").value,
        color: document.getElementById("color").value
      };

      await fetch("/api/cars", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(newCar)
      });

      form.reset();
      loadCars();
    });
    loadCars();
  </script>
</body>
</html>
